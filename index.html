<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#080808" />
  <meta name="description" content="Reloj y fecha minimalista" />
  <link rel="manifest" href="manifest.json" />
  <title>Fecha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,900;1,400&family=Outfit:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #080808; }
    body {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100dvh; position: relative;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 50%, rgba(20,18,28,0.9) 0%, #060606 100%);
    }
    .bg::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        radial-gradient(circle at 15% 85%, rgba(80,60,140,0.06) 0%, transparent 55%),
        radial-gradient(circle at 85% 15%, rgba(140,100,60,0.05) 0%, transparent 55%);
    }
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      width: 100%; padding: 0 28px; gap: 0;
      animation: rise 1.6s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .weekday {
      font-family: 'Outfit', sans-serif; font-weight: 200;
      font-size: clamp(13px, 3.5vw, 26px); letter-spacing: 0.45em;
      color: rgba(255,255,255,0.35); text-transform: uppercase;
      margin-bottom: clamp(6px, 2vw, 14px);
      animation: rise 1.6s 0.1s cubic-bezier(.22,1,.36,1) both;
    }
    .day-number {
      font-family: 'Playfair Display', serif; font-weight: 900;
      font-size: clamp(150px, 42vw, 340px); line-height: 0.85;
      color: #fff; letter-spacing: -0.03em;
      text-shadow: 0 0 80px rgba(255,255,255,0.06), 0 4px 12px rgba(0,0,0,0.7);
      user-select: none;
      animation: rise 1.6s 0.05s cubic-bezier(.22,1,.36,1) both;
    }
    .month-year {
      font-family: 'Playfair Display', serif; font-style: italic;
      font-weight: 400; font-size: clamp(22px, 6vw, 52px);
      color: rgba(255,255,255,0.55); letter-spacing: 0.06em;
      margin-top: clamp(4px, 1.2vw, 10px);
      animation: rise 1.6s 0.15s cubic-bezier(.22,1,.36,1) both;
    }
    .rule {
      width: clamp(80px, 22vw, 180px); height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      margin: clamp(18px, 4.5vw, 38px) 0;
      animation: rise 1.6s 0.2s cubic-bezier(.22,1,.36,1) both;
    }
    .time-row {
      display: flex; align-items: center; gap: clamp(10px, 2.5vw, 20px);
      animation: rise 1.6s 0.25s cubic-bezier(.22,1,.36,1) both;
    }
    .time {
      font-family: 'Outfit', sans-serif; font-weight: 200;
      font-size: clamp(36px, 10vw, 82px); letter-spacing: 0.12em;
      color: rgba(255,255,255,0.75); user-select: none;
    }
    .colon { animation: blink 1s step-start infinite; display: inline-block; color: rgba(255,255,255,0.3); }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .ampm {
      font-family: 'Outfit', sans-serif; font-weight: 200;
      font-size: clamp(12px, 2.8vw, 22px); color: rgba(255,255,255,0.28);
      letter-spacing: 0.2em; text-transform: uppercase;
      align-self: flex-end; padding-bottom: 6px;
    }
    .secs-track {
      width: clamp(100px, 28vw, 220px); height: 1px;
      background: rgba(255,255,255,0.08); border-radius: 1px;
      overflow: hidden; margin-top: clamp(12px, 3vw, 24px);
      animation: rise 1.6s 0.3s cubic-bezier(.22,1,.36,1) both;
    }
    .secs-fill { height: 100%; background: rgba(255,255,255,0.4); border-radius: 1px; transition: width 0.95s linear; }

    /* Banner instalación */
    #install-banner {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 0px), 24px);
      left: 50%; transform: translateX(-50%);
      z-index: 10;
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 40px; padding: 10px 18px 10px 16px;
      font-family: 'Outfit', sans-serif; font-weight: 300;
      font-size: 13px; letter-spacing: 0.04em;
      color: rgba(255,255,255,0.75);
      white-space: nowrap; cursor: pointer;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #install-banner.hidden { opacity: 0; transform: translateX(-50%) translateY(14px); pointer-events: none; }
    #install-banner .icon { font-size: 17px; }
    #install-btn {
      background: rgba(255,255,255,0.15); border: none; border-radius: 20px;
      padding: 5px 14px; font-family: 'Outfit', sans-serif; font-weight: 300;
      font-size: 12px; letter-spacing: 0.08em; color: #fff; cursor: pointer;
    }
    #close-banner { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 15px; cursor: pointer; padding: 2px 4px; }
    #toast {
      position: fixed; top: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.08); backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 30px;
      padding: 10px 22px; font-family: 'Outfit', sans-serif; font-weight: 300;
      font-size: 13px; color: rgba(255,255,255,0.7); letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 10;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    <div class="weekday"    id="weekday">—</div>
    <div class="day-number" id="dayNum">1</div>
    <div class="month-year" id="monthYear">Enero 2026</div>
    <div class="rule"></div>
    <div class="time-row">
      <div class="time" id="time">12<span class="colon">:</span>00</div>
      <div class="ampm" id="ampm">AM</div>
    </div>
    <div class="secs-track"><div class="secs-fill" id="secsFill" style="width:0%"></div></div>
  </div>

  <div id="install-banner" class="hidden">
    <span class="icon">📲</span>
    <span>Instalar app</span>
    <button id="install-btn">Instalar</button>
    <button id="close-banner">✕</button>
  </div>
  <div id="toast">✓ App instalada</div>

  <script>
    /* Reloj */
    const DIAS  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    function pad(n){ return String(n).padStart(2,'0'); }
    function tick(){
      const now=new Date(); let h=now.getHours();
      const m=now.getMinutes(), s=now.getSeconds(), ap=h>=12?'PM':'AM';
      h=h%12||12;
      document.getElementById('weekday').textContent=DIAS[now.getDay()];
      document.getElementById('dayNum').textContent=now.getDate();
      document.getElementById('monthYear').textContent=`${MESES[now.getMonth()]} ${now.getFullYear()}`;
      document.getElementById('time').innerHTML=`${pad(h)}<span class="colon">:</span>${pad(m)}`;
      document.getElementById('ampm').textContent=ap;
      document.getElementById('secsFill').style.width=((s/59)*100)+'%';
    }
    tick(); setInterval(tick,1000);

    /* Wake Lock */
    if('wakeLock' in navigator){
      let wl;
      const req=async()=>{try{wl=await navigator.wakeLock.request('screen');}catch(e){}};
      req();
      document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='visible') req(); });
    }

    /* Service Worker */
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }

    /* Instalación PWA */
    const banner=document.getElementById('install-banner');
    const toast=document.getElementById('toast');
    let prompt=null;
    const standalone=window.matchMedia('(display-mode: standalone)').matches;
    if(!standalone){
      window.addEventListener('beforeinstallprompt', e=>{
        e.preventDefault(); prompt=e;
        setTimeout(()=>banner.classList.remove('hidden'), 2000);
      });
    }
    document.getElementById('install-btn').addEventListener('click', async()=>{
      if(!prompt) return;
      prompt.prompt();
      const {outcome}=await prompt.userChoice;
      prompt=null; banner.classList.add('hidden');
      if(outcome==='accepted'){ toast.style.opacity='1'; setTimeout(()=>toast.style.opacity='0',3000); }
    });
    document.getElementById('close-banner').addEventListener('click',()=>banner.classList.add('hidden'));
    window.addEventListener('appinstalled',()=>{
      banner.classList.add('hidden'); prompt=null;
      toast.style.opacity='1'; setTimeout(()=>toast.style.opacity='0',3000);
    });
  </script>
</body>
</html>
